name: BIST Daily Scanner

on:
  schedule:
    - cron: '55 13 * * *'   # 08:00 Türkiye (UTC 05:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan_and_email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner and send emails
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SUBSCRIBER_EMAILS: ${{ secrets.SUBSCRIBER_EMAILS }}
        run: |
          python daily_scanner.py

      - name: Commit updated periods file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f is_yatirim_periods.json ]; then
            git add is_yatirim_periods.json
            git commit -m "Auto update: Bilanço dönemleri" || echo "No changes"
            git push
          else
            echo "is_yatirim_periods.json not found, skipping commit"
          fi
